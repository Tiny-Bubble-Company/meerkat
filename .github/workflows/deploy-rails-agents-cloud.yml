name: Sync edge (Caddy) for Rails Agents Cloud

# Apex site deploys from Tiny-Bubble-Company/rails-agents-cloud on push to main.
# This workflow only syncs Meerkat edge config when Caddy/compose change.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "deploy/Caddyfile"
      - "deploy/docker-compose.production.yml"
      - ".github/workflows/deploy-rails-agents-cloud.yml"

concurrency:
  group: deploy-rails-agents-edge-via-meerkat
  cancel-in-progress: true

jobs:
  deploy:
    name: Sync Caddy + compose
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout Meerkat
        uses: actions/checkout@v4

      - name: Sync Caddyfile + compose to Hetzner
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr
          path: deploy/
          remote_path: /opt/meerkat-apps/meerkat/deploy/
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Reload Caddy (remove orphan website/docs)
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 10m
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/meerkat-apps/meerkat/deploy
            docker compose -f docker-compose.production.yml --env-file ../.env.production up -d --remove-orphans
            docker compose -f docker-compose.production.yml exec -T caddy caddy reload --config /etc/caddy/Caddyfile \
              || docker compose -f docker-compose.production.yml restart caddy
