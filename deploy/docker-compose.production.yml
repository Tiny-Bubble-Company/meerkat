# Production stack: Postgres + Meerkat (Thruster/Puma) + Caddy (HTTPS).
# Run from meerkat/deploy:
#   docker compose -f docker-compose.production.yml --env-file ../.env.production up -d --build

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: meerkat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: meerkat_production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meerkat"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "80"
    environment:
      DATABASE_URL: "postgresql://meerkat:${POSTGRES_PASSWORD}@db/meerkat_production"
      QUEUE_DATABASE_URL: "postgresql://meerkat:${POSTGRES_PASSWORD}@db/meerkat_production_queue"
      CACHE_DATABASE_URL: "postgresql://meerkat:${POSTGRES_PASSWORD}@db/meerkat_production_cache"
      CABLE_DATABASE_URL: "postgresql://meerkat:${POSTGRES_PASSWORD}@db/meerkat_production_cable"
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "1"
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      SOLID_QUEUE_IN_PUMA: "1"
      MEERKAT_WEBSITE_URL: ${MEERKAT_WEBSITE_URL:-https://meerkatagents.com}
      MEERKAT_CLOUD_URL: ${MEERKAT_CLOUD_URL:-https://cloud.meerkatagents.com}
      MEERKAT_OPS_URL: ${MEERKAT_OPS_URL:-https://ops.meerkatagents.com}
      OPS_ADMIN_EMAIL: ${OPS_ADMIN_EMAIL:-ops@meerkatagents.com}
      OPS_ADMIN_PASSWORD: ${OPS_ADMIN_PASSWORD:-}
      MEERKAT_GITHUB_REPO: ${MEERKAT_GITHUB_REPO:-https://github.com/Tiny-Bubble-Company/meerkat}
      MEERKAT_FAILURE_THRESHOLD: ${MEERKAT_FAILURE_THRESHOLD:-5}
      MEERKAT_WEBHOOK_TIMEOUT: ${MEERKAT_WEBHOOK_TIMEOUT:-15}
      MEERKAT_CORS_ORIGINS: ${MEERKAT_CORS_ORIGINS:-*}
      COMPOSIO_API_KEY: ${COMPOSIO_API_KEY:-}
      COMPOSIO_BASE_URL: ${COMPOSIO_BASE_URL:-https://backend.composio.dev/api/v3}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-}
      STRIPE_PAYMENT_LINK_URL: ${STRIPE_PAYMENT_LINK_URL:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    volumes:
      - storage_data:/rails/storage

  website:
    build:
      context: ../../meerkat-website
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000

  # Static VitePress site for rails.meerkatagents.com
  rails_agents_docs:
    image: nginx:alpine
    container_name: rails-agents-docs
    restart: unless-stopped
    volumes:
      - /opt/meerkat-apps/rails-agents-site:/usr/share/nginx/html:ro
      - /opt/meerkat-apps/rails-agents-site-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - website
      - rails_agents_docs

volumes:
  postgres_data:
  storage_data:
  caddy_data:
  caddy_config:
