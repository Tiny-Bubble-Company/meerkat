# Fly.io configuration — run `fly launch` or use the Deploy to Fly.io button in the README.
#
# After first deploy:
#   fly secrets set RAILS_MASTER_KEY=$(cat config/master.key)
#   fly postgres create --name meerkat-db   (if you don't have Postgres yet)
#   fly postgres attach meerkat-db
#
# Users connect their own LLM keys via onboarding (BYOK).

app = "meerkat"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  RAILS_ENV = "production"
  RAILS_LOG_TO_STDOUT = "1"
  SOLID_QUEUE_IN_PUMA = "1"
  PORT = "80"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/up"
    timeout = "5s"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[deploy]
  release_command = "./bin/rails db:prepare"
