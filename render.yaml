# Render Blueprint — one-click deploy
# https://render.com/docs/blueprint-spec
#
# After deploy: set RAILS_MASTER_KEY in the Render dashboard (content of config/master.key).
# Users connect their own LLM keys via the Meerkat onboarding flow (BYOK).

databases:
  - name: meerkat-db
    databaseName: meerkat_production
    user: meerkat
    plan: free

services:
  - type: web
    name: meerkat
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /up
    preDeployCommand: ./bin/rails db:prepare
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "1"
      - key: SOLID_QUEUE_IN_PUMA
        value: "1"
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: meerkat-db
          property: connectionString
      - key: MEERKAT_GITHUB_REPO
        value: https://github.com/Tiny-Bubble-Company/meerkat
